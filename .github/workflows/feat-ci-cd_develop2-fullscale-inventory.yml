# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Test Deployment to Azure Web App - develop2-fullscale-inventory

on:
  push:
    branches:
      - feat/ci-cd
  workflow_dispatch:

permissions:
  id-token: write # Require write permission to Fetch an OIDC token.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code from the repository
      - uses: actions/checkout@v4

      # Set up Node.js
      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # Extract frontend and backend versions
      - name: Extract frontend and backend versions
        id: extract-versions
        run: |
          FRONTEND_VERSION=$(jq -r '.version' ./frontend/package.json)
          BACKEND_VERSION=$(jq -r '.version' ./backend/package.json)
          echo "FRONTEND_VERSION=$FRONTEND_VERSION" >> $GITHUB_ENV
          echo "BACKEND_VERSION=$BACKEND_VERSION" >> $GITHUB_ENV

      # Install and build the React frontend
      - name: Install and build frontend
        run: |
          cd frontend
          npm install
          npm run build

      # Install backend dependencies
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      # Build backend if using TypeScript
      - name: Build backend (TypeScript)
        run: |
          cd backend
          npm run build

      # Zip backend and reference the React 'dist' directory
      - name: Zip artifact for deployment
        run: |
          zip -r release.zip ./backend ./frontend/dist

      # Upload the artifact for the deploy job
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v3
        with:
          name: fullstack-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      # Download the artifact from the build job
      - name: Download artifact from build job
        uses: actions/download-artifact@v3
        with:
          name: fullstack-app

      # Unzip the artifact
      - name: Unzip artifact for deployment
        run: unzip release.zip

      # Deploy the backend and React build directory to Azure
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'develop2-fullscale-inventory'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BFD4ED23FA1B4B2097AF8547035BD622 }}
          package: .

      # Azure CLI Login
      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DEVELOP2_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DEVELOP2_AZURE_TENANT_ID }}
          # subscription-id: ${{ secrets.DEVELOP2_AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      # Update environment variables in Azure
      - name: Update Azure App Service environment variables
        run: |
            az webapp config appsettings set \
              --name develop2-fullscale-inventory \
              --resource-group rg-inventory-eastus-staging-001 \
              --settings BACKEND_VERSION=${{ env.BACKEND_VERSION }} FRONTEND_VERSION=${{ env.FRONTEND_VERSION }} \
              --subscription ${{ secrets.DEVELOP2_AZURE_SUBSCRIPTION_ID }}
        # env:
        #   AZURE_CREDENTIALS: ${{ secrets.DEVELOP2_AZURE_CREDENTIALS }}