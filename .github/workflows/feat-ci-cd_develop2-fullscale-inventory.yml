# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Test Deployment to Azure Web App - develop2-fullscale-inventory

on:
  push:
    branches:
      - feat/ci-cd
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code from the repository
      - uses: actions/checkout@v4

      # Set up Node.js environment for the React app
      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # Navigate to the frontend directory and install dependencies
      - name: Install dependencies and build React app
        run: |
          cd frontend
          npm install
          npm run build

      # Zip the build folder for deployment
      - name: Zip artifact for deployment
        run: |
          cd frontend/dist
          zip -r ../../release.zip ./*

      # Upload the artifact for the deploy job
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v3
        with:
          name: react-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      # Download the build artifact
      - name: Download artifact from build job
        uses: actions/download-artifact@v3
        with:
          name: react-app

      # Unzip the artifact to prepare for deployment
      - name: Unzip artifact for deployment
        run: unzip release.zip

      # Deploy the React app to Azure Web App
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'develop2-fullscale-inventory'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BFD4ED23FA1B4B2097AF8547035BD622 }}
          package: .
